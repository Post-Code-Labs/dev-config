# Shared mypy baseline for builtbydoug Python workspaces (strict mode).
#
# Copy into the repo (sync-config.sh) or merge these keys into the repo's
# [tool.mypy] section. Repo-specific keys — python_version, mypy_path,
# explicit_package_bases, framework plugins (e.g. pydantic.mypy) — stay local.

[mypy]
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_reexport = True
