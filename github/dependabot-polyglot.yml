# Dependabot baseline for a TS/JS + Python (uv) repo, e.g. personal-property.
# Copy to .github/dependabot.yml and adjust the uv `directory` to the Python
# workspace root (e.g. /python). Weekly, grouped minor+patch.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: uv
    directory: /python
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
