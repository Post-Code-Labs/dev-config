# Enforces that every third-party `uses:` in this repo's workflows is pinned to
# a full 40-char commit SHA with a `# vX` comment. Copy to
# .github/workflows/workflow-lint.yml alongside scripts/check-action-pins.sh.
name: Workflow lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/check-action-pins.sh'

permissions:
  contents: read

jobs:
  check-action-pins:
    name: Check action pins
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify all actions are SHA-pinned
        run: ./scripts/check-action-pins.sh
